<!DOCTYPE html>
<html>
<head>
  <title>AI SEO Scanner</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
    }

    .score {
      font-size: 48px;
      color: #22c55e;
    }
  </style>
</head>
<body>

  <h1>AI SEO Scanner</h1>

  <input id="url" placeholder="Enter website URL" />
  <button onclick="scan()">Scan</button>

  <div class="result" id="result"></div>

  <script>
    async function scan() {
      const url = document.getElementById("url").value;

      const res = await fetch("http://localhost:5000/scan", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      let html = `<div class="score">Score: ${data.score}</div><ul>`;
      data.issues.forEach(issue => {
        html += `<li>${issue}</li>`;
      });
      html += "</ul>";

      document.getElementById("result").innerHTML = html;
    }
  </script>

</body>
</html>
