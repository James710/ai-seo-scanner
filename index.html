<!DOCTYPE html>
<html>
<head>
  <title>AI SEO Brain</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .input-box {
      text-align: center;
      margin-bottom: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .score {
      font-size: 48px;
      color: #22c55e;
    }

    .highlight {
      color: #38bdf8;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>AI SEO Brain — Enterprise Dashboard</h1>

  <div class="input-box">
    <input id="url" placeholder="Enter website URL" />
    <button onclick="scan()">Run AI Scan</button>
  </div>

  <div class="grid">

    <div class="card">
      <h2>SEO Score</h2>
      <div id="score" class="score">--</div>
    </div>

    <div class="card">
      <h2>Projected Score (After Optimization)</h2>
      <div id="projected" class="score">--</div>
    </div>

    <div class="card">
      <h2>Issues Detected</h2>
      <ul id="issues"></ul>
    </div>

    <div class="card">
      <h2>Recommended Toolkits</h2>
      <ul id="toolkits"></ul>
    </div>

    <div class="card">
      <h2>AI Insights</h2>
      <div id="ai" class="highlight">Waiting for scan...</div>
    </div>

    <div class="card">
      <h2>Enterprise Report Preview</h2>
      <div id="report">
        Run scan to generate report...
      </div>
    </div>

  </div>

</div>

<script>
async function scan() {
  const url = document.getElementById("url").value;

  const res = await fetch("http://localhost:5000/scan", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  // Score
  document.getElementById("score").innerText = data.score;

  // Projected Score (simulate improvement)
  const projected = Math.min(data.score + 15, 100);
  document.getElementById("projected").innerText = projected;

  // Issues
  const issuesEl = document.getElementById("issues");
  issuesEl.innerHTML = "";
  data.issues.forEach(i => {
    issuesEl.innerHTML += `<li>${i}</li>`;
  });

  // Toolkits (simulate logic)
  const toolkits = [];
  if (data.score < 80) toolkits.push("Technical SEO Toolkit");
  if (data.issues.length > 2) toolkits.push("Content Optimization Toolkit");
  toolkits.push("Local SEO Toolkit");

  const tkEl = document.getElementById("toolkits");
  tkEl.innerHTML = "";
  toolkits.forEach(t => {
    tkEl.innerHTML += `<li>${t}</li>`;
  });

  // AI Insights
  document.getElementById("ai").innerHTML = `
    AI identified ${data.issues.length} critical issues impacting search visibility.
    <br><br>
    System will prioritize:
    <br>
    • Meta optimization  
    • Content structure improvements  
    • Image SEO enhancements  
    • Keyword targeting strategy  
  `;

  // Enterprise Report Preview
  document.getElementById("report").innerHTML = `
    <strong>Executive Summary:</strong><br>
    Current SEO performance is below optimal standards.<br><br>

    <strong>Key Issues:</strong><br>
    ${data.issues.join("<br>")}<br><br>

    <strong>Optimization Plan:</strong><br>
    Apply selected toolkits to resolve technical and content gaps.<br><br>

    <strong>Expected Impact:</strong><br>
    Increase rankings, traffic, and conversion potential.
  `;
}
</script>

</body>
</html>
