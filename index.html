<!DOCTYPE html>
<html>
<head>
  <title>AI SEO Brain — Enterprise</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    .container { padding:30px; max-width:1200px; margin:auto; }
    h1 { text-align:center; }

    .topbar { display:flex; justify-content:center; margin-bottom:30px; }
    input { padding:10px; width:350px; border-radius:5px; border:none; }
    button { padding:10px 20px; margin-left:10px; background:#22c55e; border:none; color:white; border-radius:5px; }

    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-bottom:20px; }
    .card { background:#1e293b; padding:20px; border-radius:10px; }
    .score { font-size:42px; color:#22c55e; }

    .section { margin-top:20px; }
    ul { padding-left:20px; }
    .toolkit { color:#38bdf8; font-weight:bold; }

    .page-block {
      background:#020617;
      padding:15px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #334155;
    }

    .toggle {
      cursor:pointer;
      color:#38bdf8;
      margin-top:10px;
      display:inline-block;
    }

    .hidden { display:none; }
  </style>
</head>

<body>
<div class="container">

<h1>AI SEO Brain — Enterprise Dashboard</h1>

<div class="topbar">
  <input id="url" placeholder="Enter website URL" />
  <button onclick="scan()">Run Full AI Scan</button>
</div>

<!-- TOP METRICS -->
<div class="grid">
  <div class="card"><h3>Current</h3><div id="score" class="score">--</div></div>
  <div class="card"><h3>Projected</h3><div id="projected" class="score">--</div></div>
  <div class="card"><h3>Improvement</h3><div id="improvement" class="score">--%</div></div>
</div>

<!-- TOOLKITS -->
<div class="card">
  <h2>AI Selected Toolkits</h2>
  <ul id="toolkits"></ul>
</div>

<!-- CHART -->
<div class="card">
  <h2>Performance Projection</h2>
  <canvas id="chart"></canvas>
</div>

<!-- PAGE LEVEL OUTPUT -->
<div class="section">
  <h2>Page-Level AI Optimization</h2>
  <div id="pages"></div>
</div>

<!-- REPORT -->
<div class="section">
  <h2>Enterprise Report</h2>
  <div class="toggle" onclick="toggleReport()">View Full Report</div>
  <div id="report" class="hidden"></div>
</div>

</div>

<script>

let chart;

async function scan() {
  const url = document.getElementById("url").value;

  const res = await fetch("http://localhost:5000/scan", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  const current = data.score;
  const projected = Math.min(current + 20, 100);
  const improvement = projected - current;

  document.getElementById("score").innerText = current;
  document.getElementById("projected").innerText = projected;
  document.getElementById("improvement").innerText = improvement + "%";

  // TOOLKITS (REAL PRODUCT DISPLAY)
  const toolkits = [
    "Technical SEO Toolkit",
    "Content Optimization Toolkit",
    "Authority & Backlink Toolkit"
  ];

  document.getElementById("toolkits").innerHTML =
    toolkits.map(t => `<li class="toolkit">${t}</li>`).join("");

  // CHART
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Current", "Projected"],
      datasets: [{ data:[current, projected] }]
    }
  });

  // PAGE LEVEL OUTPUT (CORE VALUE)
  document.getElementById("pages").innerHTML = `
    <div class="page-block">
      <strong>Homepage</strong><br>
      Keyword: Digital Marketing San Diego<br>
      Title Fix: Top Digital Marketing Agency in San Diego<br>
      Meta Fix: Increase traffic and leads with expert SEO services<br>
      Actions: Add H1, expand content, internal linking
    </div>

    <div class="page-block">
      <strong>Services Page</strong><br>
      Keyword: SEO Services San Diego<br>
      Title Fix: Professional SEO Services in San Diego<br>
      Meta Fix: Rank higher with proven strategies<br>
      Actions: Add FAQs, optimize headings, increase keyword density
    </div>
  `;

  // REPORT
  document.getElementById("report").innerHTML = `
    <strong>Executive Summary:</strong><br>
    Site performance is below enterprise standards.<br><br>

    <strong>Toolkits Applied:</strong><br>
    ${toolkits.join("<br>")}<br><br>

    <strong>Projected Impact:</strong><br>
    +${improvement}% SEO performance improvement.<br><br>

    <strong>System Action Plan:</strong><br>
    Deploy technical fixes, optimize content, build authority signals.
  `;
}

function toggleReport() {
  const r = document.getElementById("report");
  r.classList.toggle("hidden");
}

</script>

</body>
</html>
