<!DOCTYPE html>
<html>
<head>
  <title>AI SEO Brain</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .input-box {
      text-align: center;
      margin-bottom: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .score {
      font-size: 48px;
      color: #22c55e;
    }

    ul {
      padding-left: 20px;
    }

    .ai-box {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>AI SEO Brain Dashboard</h1>

  <div class="input-box">
    <input id="url" placeholder="Enter website URL" />
    <button onclick="scan()">Run AI Scan</button>
  </div>

  <div class="grid">

    <div class="card">
      <h2>SEO Score</h2>
      <div id="score" class="score">--</div>
    </div>

    <div class="card">
      <h2>Issues Detected</h2>
      <ul id="issues"></ul>
    </div>

    <div class="card">
      <h2>AI Insights</h2>
      <div id="ai" class="ai-box">
        Waiting for scan...
      </div>
    </div>

    <div class="card">
      <h2>System Modules</h2>
      <ul>
        <li>Keyword Optimization Engine</li>
        <li>Technical SEO Analyzer</li>
        <li>Competitor Intelligence</li>
        <li>Content Recommendation Engine</li>
        <li>Local SEO Enhancer</li>
      </ul>
    </div>

  </div>

</div>

<script>
async function scan() {
  const url = document.getElementById("url").value;

  const res = await fetch("http://localhost:5000/scan", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  document.getElementById("score").innerText = data.score;

  const issuesEl = document.getElementById("issues");
  issuesEl.innerHTML = "";
  data.issues.forEach(i => {
    issuesEl.innerHTML += `<li>${i}</li>`;
  });

  // 🔥 Simulated AI Brain Output
  document.getElementById("ai").innerHTML = `
    Based on scan results, this system would:
    <br><br>
    • Optimize missing meta tags for ranking improvement  
    • Improve content structure (H1 usage)  
    • Enhance image SEO via alt attributes  
    • Deploy keyword targeting strategy  
    • Trigger content + backlink optimization workflows  
  `;
}
</script>

</body>
</html>
